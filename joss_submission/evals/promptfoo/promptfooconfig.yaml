description: "ATU replayable eval suite"
prompts:
  - "ATU replay evaluation for {{ episode_id }}: {{ task_goal }}"
providers:
  - id: file://providers/atu-noop.js

defaultTest:
  metadata:
    source: atu-jsonl

tests:
  - file://tests/train/*.yaml
  - file://tests/eval/*.yaml
  - file://tests/test/*.yaml
